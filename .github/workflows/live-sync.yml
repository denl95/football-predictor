name: Live match sync

# Manually-triggerable ping of the deployed /api/cron/sync endpoint, kept as an
# on-demand backup. The regular schedule is driven externally by cron-job.org,
# which is far more punctual than GitHub Actions' best-effort scheduler.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   APP_URL      Base URL of the deployed app, e.g. https://your-app.vercel.app
#   CRON_SECRET  Same value as the CRON_SECRET env var in Vercel

on:
  workflow_dispatch: {}

concurrency:
  group: live-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::APP_URL and/or CRON_SECRET repository secret is not set"
            exit 1
          fi
          # Normalise: strip trailing slash, default to https:// if no scheme given.
          base="${APP_URL%/}"
          case "$base" in
            http://*|https://*) ;;
            *) base="https://$base" ;;
          esac
          # -L --location-trusted follows redirects (e.g. http->https, Vercel alias
          # -> canonical domain) and keeps the Authorization header across them.
          status=$(curl -sS -L --location-trusted -X GET \
            -o /tmp/sync-response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${base}/api/cron/sync")
          echo "HTTP ${status}"
          cat /tmp/sync-response.json || true
          echo ""
          if [ "${status}" != "200" ] || ! grep -q '"ok"' /tmp/sync-response.json; then
            echo "::error::Sync failed (HTTP ${status}). If the response is a login / 'Authentication Required' page, the URL is redirecting: set APP_URL to your canonical production domain (with https://) and ensure Vercel Deployment Protection isn't enabled for it."
            exit 1
          fi
