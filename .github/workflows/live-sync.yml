name: Live match sync

# Pings the deployed /api/cron/sync endpoint so match status + scores refresh
# during games (the Vercel cron only runs once a day on Hobby plans).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   APP_URL      Base URL of the deployed app, e.g. https://your-app.vercel.app
#   CRON_SECRET  Same value as the CRON_SECRET env var in Vercel
#
# Note on cost/cadence: GitHub Actions' minimum schedule granularity is 5 minutes
# and runs are best-effort (can be delayed under load). Minutes are free/unlimited
# for public repos; private repos get 2000 min/month and bill each run as >=1 min,
# so every-5-min (~288 runs/day) will exceed the free tier — widen the interval
# (e.g. "*/15 * * * *") or restrict to match hours if this repo is private.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Don't let a slow run overlap with the next scheduled one.
concurrency:
  group: live-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::APP_URL and/or CRON_SECRET repository secret is not set"
            exit 1
          fi
          status=$(curl -sS -X GET \
            -o /tmp/sync-response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/sync")
          echo "HTTP ${status}"
          cat /tmp/sync-response.json || true
          echo ""
          if [ "${status}" != "200" ]; then
            echo "::error::Sync failed with HTTP ${status}"
            exit 1
          fi
